management.observations.annotations.enabled=true

# Emit both W3C and B3 on outbound calls, accept any common format on inbound.
# This keeps cross-service correlation working while the jEAP applications migrates from
# B3 (Brave) to W3C (OpenTelemetry). Once the whole fleet is on W3C, the
# `produce` list can be narrowed to `W3C` only.
management.tracing.propagation.produce=W3C,B3
management.tracing.propagation.consume=W3C,B3,B3_MULTI

# Don't export metrics over OTLP from a jEAP application by default.
# Metrics are exposed via the Prometheus actuator endpoint (micrometer-registry-prometheus).
# Guard against accidental exposure via transitive inclusion of micrometer-registry-otlp by applications.
management.otlp.metrics.export.enabled=false

# OTLP tracing publishing is off by default: Spring Boot only creates the OTLP
# span exporter when `management.otlp.tracing.endpoint` is set. Applications that
# want to publish traces opt in by configuring the endpoint, e.g.
#   management.otlp.tracing.endpoint=https://collector.example/v1/traces
# Until then, the tracing stack still runs locally (trace/span ids in MDC, W3C
# and B3 propagation) but nothing is shipped off-host.
